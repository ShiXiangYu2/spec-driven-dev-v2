<script type="text/babel">
(function() {
  const { createContext, useContext, useState, useEffect, useRef, useCallback } = React;
  const TimeContext = createContext({ time: 0, duration: 10, playing: false });
  const SpriteContext = createContext(null);

  const Easing = {
    linear: t => t,
    easeIn: t => t * t,
    easeOut: t => 1 - (1 - t) * (1 - t),
    easeInOut: t => t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2,
    expoOut: t => t === 1 ? 1 : 1 - Math.pow(2, -10 * t),
    overshoot: t => {
      const c1 = 1.70158, c3 = c1 + 1;
      return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
    },
    spring: t => {
      const c = (2 * Math.PI) / 3;
      return t === 0 ? 0 : t === 1 ? 1 : Math.pow(2, -10 * t) * Math.sin((t * 10 - 0.75) * c) + 1;
    },
  };

  function interpolate(t, input, output, easing) {
    const [inStart, inEnd] = input;
    const [outStart, outEnd] = output;
    if (t <= inStart) return outStart;
    if (t >= inEnd) return outEnd;
    let progress = (t - inStart) / (inEnd - inStart);
    if (easing) progress = easing(progress);
    return outStart + (outEnd - outStart) * progress;
  }

  function useTime() { return useContext(TimeContext).time; }
  function useSprite() {
    const sprite = useContext(SpriteContext);
    return sprite || { t: 0, elapsed: 0, duration: 0 };
  }

  const stageStyles = {
    wrapper: { position: 'fixed', inset: 0, background: '#000', display: 'flex', flexDirection: 'column', fontFamily: '-apple-system, sans-serif' },
    stageHolder: { flex: 1, position: 'relative', overflow: 'hidden' },
    canvas: { position: 'absolute', top: '50%', left: '50%', transformOrigin: 'center center', background: '#111', overflow: 'hidden' },
    controls: { position: 'fixed', bottom: 0, left: 0, right: 0, background: 'rgba(0,0,0,0.8)', backdropFilter: 'blur(10px)', padding: '12px 20px', display: 'flex', alignItems: 'center', gap: 16, color: '#fff', fontSize: 12, zIndex: 100 },
    button: { background: 'none', border: '1px solid rgba(255,255,255,0.3)', color: '#fff', padding: '6px 14px', borderRadius: 4, cursor: 'pointer', fontSize: 12 },
    timeDisplay: { fontFamily: 'ui-monospace, monospace', fontVariantNumeric: 'tabular-nums', minWidth: 90 },
    scrubber: { flex: 1, height: 4, background: 'rgba(255,255,255,0.2)', borderRadius: 2, position: 'relative', cursor: 'pointer' },
    scrubberFill: { position: 'absolute', top: 0, left: 0, height: '100%', background: '#fff', borderRadius: 2, pointerEvents: 'none' },
    scrubberHandle: { position: 'absolute', top: '50%', width: 12, height: 12, background: '#fff', borderRadius: '50%', transform: 'translate(-50%, -50%)', pointerEvents: 'none' },
  };

  function Stage({ duration = 10, width = 1920, height = 1080, loop = true, children, bgColor = '#fff' }) {
    const [time, setTime] = useState(0);
    const [playing, setPlaying] = useState(true);
    const [scale, setScale] = useState(1);
    const rafRef = useRef(null);
    const effectiveLoop = (typeof window !== 'undefined' && window.__recording) ? false : loop;

    useEffect(() => {
      function updateScale() {
        const vw = window.innerWidth;
        const vh = window.innerHeight - 56;
        const s = Math.min(vw / width, vh / height);
        setScale(s);
      }
      updateScale();
      window.addEventListener('resize', updateScale);
      return () => window.removeEventListener('resize', updateScale);
    }, [width, height]);

    useEffect(() => {
      if (!playing) return;
      let cancelled = false;
      let last = null;
      function tick(now) {
        if (cancelled) return;
        if (last === null) {
          last = now;
          if (typeof window !== 'undefined') window.__ready = true;
        }
        const delta = (now - last) / 1000;
        last = now;
        setTime(prev => {
          const next = prev + delta;
          if (next >= duration) return effectiveLoop ? 0 : duration - 0.001;
          return next;
        });
        rafRef.current = requestAnimationFrame(tick);
      }
      const startAfterFonts = () => {
        if (cancelled) return;
        rafRef.current = requestAnimationFrame(tick);
      };
      if (typeof document !== 'undefined' && document.fonts && document.fonts.ready) {
        document.fonts.ready.then(startAfterFonts);
      } else {
        startAfterFonts();
      }
      return () => { cancelled = true; cancelAnimationFrame(rafRef.current); };
    }, [playing, duration, effectiveLoop]);

    const handleScrub = useCallback((e) => {
      const rect = e.currentTarget.getBoundingClientRect();
      const ratio = (e.clientX - rect.left) / rect.width;
      setTime(Math.max(0, Math.min(duration, ratio * duration)));
    }, [duration]);
    const handleSeek = useCallback((e) => { handleScrub(e); setPlaying(false); }, [handleScrub]);
    const progress = time / duration;
    const ctx = { time, duration, playing, setPlaying, setTime };
    const canvasStyle = { ...stageStyles.canvas, width, height, background: bgColor, transform: `translate(-50%, -50%) scale(${scale})` };

    return (
      <TimeContext.Provider value={ctx}>
        <div style={stageStyles.wrapper}>
          <div style={stageStyles.stageHolder}>
            <div style={canvasStyle}>{children}</div>
          </div>
          <div className="no-record" style={stageStyles.controls}>
            <button style={stageStyles.button} onClick={() => setPlaying(p => !p)}>{playing ? 'Pause' : 'Play'}</button>
            <button style={stageStyles.button} onClick={() => setTime(0)}>Reset</button>
            <div style={stageStyles.timeDisplay}>{time.toFixed(2)}s / {duration.toFixed(2)}s</div>
            <div style={stageStyles.scrubber} onMouseDown={handleSeek}>
              <div style={{ ...stageStyles.scrubberFill, width: `${progress * 100}%` }} />
              <div style={{ ...stageStyles.scrubberHandle, left: `${progress * 100}%` }} />
            </div>
          </div>
        </div>
      </TimeContext.Provider>
    );
  }

  function Sprite({ start = 0, end, children, style }) {
    const { time } = useContext(TimeContext);
    const actualEnd = end == null ? Infinity : end;
    if (time < start || time >= actualEnd) return null;
    const duration = actualEnd - start;
    const elapsed = time - start;
    const t = duration === 0 ? 1 : Math.max(0, Math.min(1, elapsed / duration));
    const spriteValue = { t, elapsed, duration, start, end: actualEnd };
    return (
      <SpriteContext.Provider value={spriteValue}>
        <div style={{ position: 'absolute', inset: 0, ...style }}>{children}</div>
      </SpriteContext.Provider>
    );
  }

  if (typeof window !== 'undefined') {
    window.Animations = { Stage, Sprite, useTime, useSprite, Easing, interpolate };
  }
})();
</script>

<!-- ======== 主动画 ======== -->
<script type="text/babel">
const { Stage, Sprite, useTime, useSprite, Easing, interpolate } = window.Animations;

const DURATION = 75;
const BG = '#0A0A12';
const ACCENT = '#00D4AA';
const ACCENT_DIM = 'rgba(0,212,170,0.15)';
const TEXT = '#F5F5F0';
const TEXT_DIM = '#888888';
const TEXT_MUTED = '#555555';
const CARD_BG = 'rgba(255,255,255,0.04)';
const CARD_BORDER = 'rgba(255,255,255,0.08)';
const RED = '#FF4444';
const RED_DIM = 'rgba(255,68,68,0.12)';

const serif = "'Source Serif 4', 'Noto Serif SC', serif";
const mono = "'JetBrains Mono', monospace";
const sans = "-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";

// ═══════ 通用动画组件 ═══════

function FadeIn({ children, delay = 0, duration = 0.5, fromY = 30, style = {} }) {
  const { t } = useSprite();
  const p = interpolate(t, [delay, delay + duration], [0, 1], Easing.expoOut);
  const y = interpolate(t, [delay, delay + duration], [fromY, 0], Easing.expoOut);
  const o = interpolate(t, [delay, delay + duration * 0.6], [0, 1], Easing.expoOut);
  return <div style={{ opacity: o, transform: `translateY(${y}px)`, ...style }}>{children}</div>;
}

function SlideIn({ children, from = 'bottom', delay = 0, duration = 0.5, style = {} }) {
  const { t } = useSprite();
  const p = interpolate(t, [delay, delay + duration], [0, 1], Easing.expoOut);
  const dirs = { left: [-60, 0], right: [60, 0], top: [0, -40], bottom: [0, 40] };
  const [ox, oy] = dirs[from] || [0, 40];
  const x = interpolate(t, [delay, delay + duration], [ox, 0], Easing.expoOut);
  const y = interpolate(t, [delay, delay + duration], [oy, 0], Easing.expoOut);
  return <div style={{ opacity: p, transform: `translate(${x}px, ${y}px)`, ...style }}>{children}</div>;
}

function CountUp({ from = 0, to = 100, prefix = '', suffix = '', delay = 0 }) {
  const { t } = useSprite();
  const p = interpolate(t, [delay, delay + 0.6], [0, 1], Easing.expoOut);
  const v = Math.floor(from + (to - from) * p);
  return <span>{prefix}{v}{suffix}</span>;
}

function GlowLine({ delay = 0, width: w = 200 }) {
  const { t } = useSprite();
  const p = interpolate(t, [delay, delay + 0.8], [0, 1], Easing.expoOut);
  return (
    <div style={{
      width: w * p, height: 1,
      background: `linear-gradient(90deg, transparent, ${ACCENT}, transparent)`,
      margin: '16px auto',
    }} />
  );
}

// ═══════ 场景组件 ═══════

    { text: 'function login() {', x: 140, y: 200, rot: -8, delay: 0.1 },
    { text: '  // TODO: fix this', x: 1200, y: 350, rot: 5, delay: 0.2 },
    { text: 'if (user) { ... }', x: 200, y: 600, rot: 3, delay: 0.15 },
    { text: 'import { auth } from "..."', x: 1300, y: 680, rot: -4, delay: 0.25 },
    { text: '// 这里要改', x: 400, y: 420, rot: 7, delay: 0.3 },
    { text: 'const token = ???', x: 1050, y: 240, rot: -6, delay: 0.35 },
    { text: 'FIXME: 逻辑混乱', x: 650, y: 520, rot: 2, delay: 0.2 },
    { text: 'router.push("/")', x: 300, y: 750, rot: -3, delay: 0.4 },
    { text: '// 等后端给接口', x: 1150, y: 800, rot: 6, delay: 0.3 },
  ];

  return (
    <div style={{ width: '100%', height: '100%', position: 'relative', fontFamily: sans }}>
      {/* 标题 */}
      <FadeIn delay={0} duration={0.6}>
        <div style={{
          position: 'absolute', top: 80, left: 0, right: 0, textAlign: 'center',
          fontFamily: serif, fontSize: 64, fontWeight: 700, color: TEXT,
          letterSpacing: '-0.02em',
        }}>
          混乱的开发
        </div>
      </FadeIn>
      <FadeIn delay={0.3} duration={0.5}>
        <div style={{
          position: 'absolute', top: 170, left: 0, right: 0, textAlign: 'center',
          fontFamily: sans, fontSize: 24, color: TEXT_DIM, fontWeight: 400,
        }}>
          代码写了又删，需求改了又改，范围无限蔓延
        </div>
      </FadeIn>

      {/* 代码碎片 */}
      {fragments.map((f, i) => {
        const ft = Math.max(0, t - f.delay);
        const op = interpolate(ft, [0, 0.4], [0, 0.25], Easing.easeOut);
        const yOff = interpolate(ft, [0, 0.6], [20, 0], Easing.easeOut);
        return (
          <div key={i} style={{
            position: 'absolute',
            left: f.x, top: f.y + yOff,
            fontFamily: mono, fontSize: 18, color: '#FF6B6B',
            opacity: op,
            transform: `rotate(${f.rot}deg)`,
            background: RED_DIM,
            padding: '8px 16px',
            borderRadius: 6,
            border: '1px solid rgba(255,68,68,0.2)',
            whiteSpace: 'nowrap',
          }}>
            {f.text}
          </div>
        );
      })}

      {/* 痛点数据 */}
      <div style={{ position: 'absolute', bottom: 120, left: 0, right: 0, display: 'flex', justifyContent: 'center', gap: 80 }}>
        {[
          { label: '返工率', val: 60, suffix: '%', delay: 0.5 },
          { label: '需求变更', val: 3, suffix: 'x', delay: 0.7 },
          { label: '超期项目', val: 45, suffix: '%', delay: 0.9 },
        ].map((item, i) => (
          <FadeIn key={i} delay={item.delay} duration={0.5}>
            <div style={{ textAlign: 'center' }}>
              <div style={{ fontFamily: mono, fontSize: 56, fontWeight: 600, color: RED, lineHeight: 1 }}>
                <CountUp from={0} to={item.val} suffix={item.suffix} />
              </div>
              <div style={{ fontFamily: sans, fontSize: 18, color: TEXT_DIM, marginTop: 8 }}>
                {item.label}
              </div>
            </div>
          </FadeIn>
        ))}
      </div>
    </div>
  );
}

        }}>

    { num: '2', title: '代码库资产诊断', desc: '扫描项目结构\n提取技术约束', time: '3-5min' },

// ── 连接箭头 (用于场景之间) ──
function ConnectorArrow({ start, end, y = 540 }) {
  const { time } = useTime();
  if (time < start || time >= end) return null;
  const localT = (time - start) / (end - start);
  const opacity = localT < 0.2 ? localT / 0.2 : localT > 0.8 ? (1 - localT) / 0.2 : 1;

  return (
    <div style={{
      position: 'absolute',
      left: '50%', top: y,
      transform: 'translateX(-50%)',
      opacity,
    }}>
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
        <path d="M20 5 L20 30 M10 22 L20 32 L30 22" stroke={ACCENT} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
      </svg>
    </div>
  );
}

  );
}
